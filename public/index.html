<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8"/>
<title>Alert Proxy</title>
<style>
*{margin:0;padding:0;box-sizing:border-box;}
body{background:#0a0a0a;color:#f0f0f0;font-family:sans-serif;display:flex;align-items:center;justify-content:center;height:100vh;}
</style>
</head>
<body>
<script>
  var url = new URLSearchParams(location.search).get('url');
  if (url) {
    location.replace('/proxy?url=' + encodeURIComponent(url));
  }
</script>
</body>
</html>
